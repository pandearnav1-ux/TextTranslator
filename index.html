<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Translator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body 
        {
            background-color:#f1f5f9;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:16px;
            margin:0;
            font-family:sans-serif;
        }
        .grad 
        {
            width:100%;
            background:linear-gradient(45deg, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            padding:1.5vw; 
            border-radius:1.25rem;
            box-sizing:border-box;
            box-shadow:0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .main 
        {
            width:100%;
            background-color:#ffffff;
            border-radius:1.1rem;
            padding:32px;
            box-sizing:border-box;
        }
        .title 
        {
            font-size:1.875rem;
            font-weight:800;
            text-align:center;
            margin:0 0 8px 0;
            color:#0f172a;
        }
        .subTitle 
        {
            color:#64748b;
            font-size:0.875rem;
            text-align:center;
            margin:0 0 24px 0;
        }
        .key 
        {
            margin-bottom:24px;
            background-color:#f8fafc;
            padding:16px;
            border-radius:0.75rem;
            border:1px solid #e2e8f0;
        }
        .keyLabel 
        {
            font-size:0.75rem;
            font-weight:600;
            color:#64748b;
            display:block;
            margin-bottom:8px;
        }
        .keyInput 
        {
            width:100%;
            background-color:#ffffff;
            border:1px solid #cbd5e1;
            border-radius:0.5rem;
            padding:8px 12px;
            font-size:0.875rem;
            color:#0f172a;
            box-sizing:border-box;
            outline:none;
        }
        .keyInput:focus 
        {
            border-color:#d6249f;
        }
        .gridContainer 
        {
            display:grid;
            grid-template-columns:1fr;
            gap:24px;
        }
        .panelBox 
        {
            display:flex;
            flex-direction:column;
        }
        .panelLabel 
        {
            font-size:0.875rem;
            font-weight:600;
            color:#475569;
            margin-bottom:8px;
        }
        .labelRow 
        {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:8px;
        }
        .textField 
        {
            width:100%;
            height:10rem;
            background-color:#f8fafc;
            border:1px solid #e2e8f0;
            border-radius:0.75rem;
            padding:16px;
            color:#0f172a;
            font-size:1rem;
            outline:none;
            resize:none;
            box-sizing:border-box;
        }
        .textField:focus 
        {
            border-color:#d6249f;
        }
        .selectMenu 
        {
            background-color:#ffffff;
            border:1px solid #cbd5e1;
            border-radius:0.5rem;
            padding:4px 12px;
            font-size:0.75rem;
            color:#475569;
            font-weight:500;
            outline:none;
            cursor:pointer;
        }
        .selectMenu:focus 
        {
            border-color:#d6249f;
        }
        .output 
        {
            width:100%;
            height:10rem;
            background-color:#f8fafc;
            border:1px dashed #cbd5e1;
            border-radius:0.75rem;
            padding:16px;
            color: #0f172a;
            overflow-y:auto;
            position:relative;
            box-sizing:border-box;
        }
        .loadingState 
        {
            position:absolute;
            background-color:rgba(255, 255, 255, 0.9);
            display:flex;
            align-items:center;
            justify-content:center;
            color:#d6249f;
            font-weight:600;
            font-size:0.875rem;
        }
        .error 
        {
            color:#b91c1c;
            font-size:0.875rem;
            padding:8px;
            background-color:#fef2f2;
            border:1px solid #fee2e2;
            border-radius:0.25rem;
            margin:0;
        }
        .place 
        {
            color:#94a3b8;
            font-style:italic;
            font-size:0.875rem;
            margin:0;
        }
        .translate 
        {
            color:#0f172a;
            font-size:0.875rem;
            margin:0;
        }
        .btnRow 
        {
            margin-top:32px;
            display:flex;
            justify-content:flex-end;
        }
        .submitBtn 
        {
            width:100%;
            padding:14px 28px;
            background:linear-gradient(45deg, #fdf497 0%, #fd5949 45%, #d6249f 60%);
            color:#ffffff;
            font-weight:700;
            border-radius:0.75rem;
            border:none;
            cursor:pointer;
            box-shadow:0 4px 6px -1px rgba(253, 89, 73, 0.2);
            transition:opacity 0.2s;
        }
        .submitBtn:hover 
        {
            opacity:0.95;
        }
        .submitBtn:disabled 
        {
            background:#cbd5e1;
            box-shadow:none;
            cursor:not-allowed;
            color:#94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Agar host change karna ho toh yahan se karenge
        const RAPIDAPI_HOST = "free-google-translate.p.rapidapi.com";
        const LANGUAGES = [
            {code:"hi",name:"Hindi" },
            {code:"es",name:"Spanish" },
            {code:"fr",name:"French" },
            {code:"de",name:"German" },
            {code:"ja",name:"Japanese" },
            {code:"ar",name:"Arabic" }
        ];
        function App() 
        {
            const[apiKey, setApiKey]=React.useState(""); 
            const[inputText, setInputText]=React.useState("");
            const[translate, settranslate]=React.useState("");
            const[targetLang, setTargetLang]=React.useState("hi");
            const[loading, setLoading]=React.useState(false);
            const[error, setError]=React.useState("");
            const handleTranslate=async() => 
            {
                // api key check
                if(!apiKey.trim()) 
                {
                    setError("Please enter your RapidAPI Key first!");
                    return;
                }
                if(!inputText.trim()) 
                {
                    return;
                }
                setLoading(true);
                setError("");
                settranslate("");
                const options={
                    method: "POST",
                    headers:{
                        "content-type": "application/json",
                        "X-RapidAPI-Key": apiKey, 
                        "X-RapidAPI-Host": RAPIDAPI_HOST
                    },
                    body: JSON.stringify({
                        text: inputText,
                        source: "en",
                        target: targetLang
                    })
                };
                try 
                {
                    const response=await fetch(`https://${RAPIDAPI_HOST}/translate`, options);
                    if(!response.ok) 
                    {
                        throw new Error("API Request failed. Please check your Key or API Host name setup.");
                    }
                    const result=await response.json();
                    // JSON ke according parsing
                    const translation=result.translated_text||result.translation||(result.data && result.data.translations[0].translate);
                    if(translation) 
                    {
                        settranslate(translation);
                    } 
                    else 
                    {
                        throw new Error("Could not parse response. The API structure might be different.");
                    }
                } 
                catch(err) 
                {
                    setError(err.message||"Something went wrong.");
                } 
                finally 
                {
                    setLoading(false);
                }
            };
            return (
                <div class="grad">
                    <div class="main">
                        <h1 class="title">Universal Translator</h1>
                        <p class="subTitle">
                            Translate English text into your preferred language instantly.
                        </p>
                        <div class="key">
                            <label class="keyLabel">Enter your RapidAPI Key:</label>
                            <input  type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="x-rapidapi-key-goes-here..." class="keyInput"/>
                        </div>
                        <div class="gridContainer">
                            <div class="panelBox">
                                <label class="panelLabel">English Input</label>
                                <textarea  value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="Type something in English..."  class="textField"/>
                            </div>
                            <div class="panelBox">
                                <div class="labelRow">
                                    <label class="panelLabel">Translation</label>
                                    <select  value={targetLang} onChange={(e) => setTargetLang(e.target.value)} class="selectMenu">
                                        {LANGUAGES.map((lang) => (
                                            <option key={lang.code} value={lang.code}>
                                                {lang.name}
                                            </option>
                                        ))}
                                    </select>
                                </div>
                                <div class="output">
                                    {loading&&(
                                        <div class="loadingState">Translating...</div>
                                    )}
                                    {error&&(
                                        <p class="error">{error}</p>
                                    )}
                                    {!loading&&!error&&(
                                        <p class={translate ? "translate" : "place"}>
                                            {translate || "Translation will appear here..."}
                                        </p>
                                    )}
                                </div>
                            </div>
                        </div>
                        <div class="btnRow">
                            <button  onClick={handleTranslate} disabled={loading || !inputText.trim() || !apiKey.trim()} class="submitBtn" > Translate Now
                            </button>
                        </div>
                    </div>
                </div>
            );
        }
        const root=ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
